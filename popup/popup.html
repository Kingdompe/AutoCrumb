<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>AutoCrumb</title>
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <img src="../icons/icon32.png" alt="" class="logo">
        <span class="title">AutoCrumb</span>
      </div>
      <div class="header-right">
        <button id="btn-toggle" class="btn-icon" title="Toggle on/off">
          <svg class="icon-power" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
            <line x1="12" y1="2" x2="12" y2="12"/>
          </svg>
        </button>
        <button id="btn-settings" class="btn-icon" title="Settings">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Disabled banner -->
    <div id="disabled-banner" class="banner banner-warning hidden">
      AutoCrumb is disabled
    </div>

    <!-- Current site info -->
    <section class="site-info">
      <div class="site-domain" id="site-domain">—</div>
      <div class="site-meta">
        <span class="cookie-count"><span id="cookie-count">0</span> cookies</span>
        <span class="list-badge" id="list-badge">unprotected</span>
      </div>
    </section>

    <!-- Quick actions -->
    <section class="quick-actions">
      <div class="action-group" id="suggestions-container">
        <!-- Dynamically populated with whitelist/greylist buttons -->
      </div>
    </section>

    <!-- Matched expression -->
    <section id="matched-section" class="matched-section hidden">
      <div class="matched-label">Matched rule:</div>
      <div class="matched-expression">
        <code id="matched-pattern"></code>
        <button id="btn-remove-match" class="btn-text btn-danger" title="Remove rule">remove</button>
      </div>
    </section>

    <!-- Clean button -->
    <section class="clean-section">
      <button id="btn-clean" class="btn-primary">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        Clean Now
      </button>
    </section>

    <!-- Activity log -->
    <section class="activity-section">
      <div class="activity-header">Recent activity</div>
      <div id="activity-log" class="activity-log">
        <div class="activity-empty">No recent activity</div>
      </div>
    </section>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
